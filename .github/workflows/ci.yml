name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  ci:
    name: Build / Test / Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build
        run: make build

      - name: Test
        run: make test

      - name: Vet
        run: make vet

      - name: Check formatting
        run: make fmt-check

      - name: Lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v1.64.8
