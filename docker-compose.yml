services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: weaver
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: weaver
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U weaver -d weaver"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
